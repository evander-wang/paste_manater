name: paste_manager
description: 智能剪贴板管理器 - macOS 原生应用
version: 0.1.0
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter

  # 本地存储
  shared_preferences: ^2.2.2
  path_provider: ^2.1.1

  # 加密和哈希
  crypto: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  mocktail: ^1.0.1

flutter:
  uses-material-design: true
